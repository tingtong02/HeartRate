preprocess:
  target_ppg_fs: 64
  window_seconds: 8.0
  step_seconds: 2.0

eval:
  random_seed: 42
  test_size: 0.3
  hr_band_bpm: [40, 180]

stage1:
  preprocess:
    bandpass_low_hz: 0.6
    bandpass_high_hz: 3.5
    bandpass_order: 3
    smooth_window_seconds: 0.20
    smooth_polyorder: 2
  frequency:
    bandpass_low_hz: 0.6
    bandpass_high_hz: 3.5
    bandpass_order: 3
    smooth_window_seconds: 0.20
    smooth_polyorder: 2
    extra_smoothing: false
    welch_nperseg_seconds: 8.0
    nfft_min: 2048
    edge_margin_bpm: 5.0
    min_peak_power_fraction: 0.10
  time:
    bandpass_low_hz: 0.6
    bandpass_high_hz: 3.5
    bandpass_order: 3
    smooth_window_seconds: 0.20
    smooth_polyorder: 2
    extra_smoothing: true
    envelope_smooth_window_seconds: 0.12
    prominence_scale: 0.35
    min_prominence: 0.05
    min_peaks: 3
    min_width_seconds: 0.08
  fusion:
    agreement_threshold_bpm: 6.0
    conflict_threshold_bpm: 12.0

stage3:
  target:
    good_error_bpm: 5.0
    poor_error_bpm: 10.0
  rule:
    good_score_threshold: 0.55
    peak_ratio_bad: 1.1
    peak_ratio_good: 2.5
    agreement_good_bpm: 3.0
    agreement_bad_bpm: 12.0
    missing_time_agreement_score: 0.0
    diff_std_good: 0.12
    diff_std_bad: 0.35
    weights:
      freq_confidence: 0.45
      peak_ratio: 0.25
      agreement: 0.15
      time_confidence: 0.10
      smoothness: 0.05
  motion:
    accel_std_threshold: 0.35
    accel_range_threshold: 1.5
  motion_refine:
    enabled: true
    quality_threshold: ~
    motion_aux_good: 0.70
    motion_aux_bad: 0.35
    peak_ratio_good: 2.5
    peak_ratio_bad: 1.1
    time_confidence_good: 0.60
    time_confidence_bad: 0.25
    hr_agreement_good_bpm: 3.0
    hr_agreement_bad_bpm: 12.0
    missing_time_agreement_score: 0.0
    diff_std_good: 0.12
    diff_std_bad: 0.35
    acc_std_good: 0.15
    acc_std_bad: 0.45
    acc_range_good: 0.40
    acc_range_bad: 1.80
    blend_weight: 0.20
    penalty_if_motion_flag: 0.03
    penalty_if_high_acc_std: 0.03
    penalty_if_high_acc_range: 0.03
    penalty_if_high_diff_std: 0.04
    penalty_if_low_peak_ratio: 0.03
    penalty_if_low_time_confidence: 0.02
    penalty_if_high_hr_disagreement: 0.04
    weights:
      diff_std: 0.30
      hr_agreement: 0.25
      time_confidence: 0.15
      peak_ratio: 0.15
      acc_std: 0.075
      acc_range: 0.075
  denoise:
    enabled: true
    method: dwt
    wavelet: db4
    max_level: 4
    threshold_mode: soft
    threshold_scale: 1.0
  ml:
    model_name: logistic_regression
    c_value: 1.0
    max_iter: 1000
    min_retention_ratio: 0.95
    threshold_grid: [0.30, 0.35, 0.40, 0.45, 0.50, 0.55, 0.60, 0.65, 0.70, 0.75, 0.80]
    refine_threshold: true
    refinement_radius: 0.10
    refinement_step: 0.02
    stability_mae_tolerance: 0.10
    stable_min_threshold_count: 3
    save_threshold_analysis: true

output:
  save_csv: true
  output_dir: outputs
