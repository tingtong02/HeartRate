preprocess:
  target_ppg_fs: 64
  window_seconds: 8.0
  step_seconds: 2.0

eval:
  random_seed: 42
  test_size: 0.3
  hr_band_bpm: [40, 180]

stage1:
  preprocess:
    bandpass_low_hz: 0.6
    bandpass_high_hz: 3.5
    bandpass_order: 3
    smooth_window_seconds: 0.20
    smooth_polyorder: 2
  frequency:
    bandpass_low_hz: 0.6
    bandpass_high_hz: 3.5
    bandpass_order: 3
    smooth_window_seconds: 0.20
    smooth_polyorder: 2
    extra_smoothing: false
    welch_nperseg_seconds: 8.0
    nfft_min: 2048
    edge_margin_bpm: 5.0
    min_peak_power_fraction: 0.10
  time:
    bandpass_low_hz: 0.6
    bandpass_high_hz: 3.5
    bandpass_order: 3
    smooth_window_seconds: 0.20
    smooth_polyorder: 2
    extra_smoothing: true
    envelope_smooth_window_seconds: 0.12
    prominence_scale: 0.35
    min_prominence: 0.05
    min_peaks: 3
    min_width_seconds: 0.08
  fusion:
    agreement_threshold_bpm: 6.0
    conflict_threshold_bpm: 12.0

stage3:
  target:
    good_error_bpm: 5.0
    poor_error_bpm: 10.0
  rule:
    good_score_threshold: 0.55
    peak_ratio_bad: 1.1
    peak_ratio_good: 2.5
    agreement_good_bpm: 3.0
    agreement_bad_bpm: 12.0
    missing_time_agreement_score: 0.0
    diff_std_good: 0.12
    diff_std_bad: 0.35
    weights:
      freq_confidence: 0.45
      peak_ratio: 0.25
      agreement: 0.15
      time_confidence: 0.10
      smoothness: 0.05
  motion:
    accel_std_threshold: 0.35
    accel_range_threshold: 1.5
  ml:
    model_name: logistic_regression
    c_value: 1.0
    max_iter: 1000
    min_retention_ratio: 0.95
    threshold_grid: [0.30, 0.35, 0.40, 0.45, 0.50, 0.55, 0.60, 0.65, 0.70, 0.75, 0.80]
    refine_threshold: true
    refinement_radius: 0.10
    refinement_step: 0.02
  robust_hr_policy:
    enabled: true
    direct_quality_threshold: 0.55
    direct_jump_guard_bpm: 20.0
    fallback_enabled: true
    fallback_variant_mode: enhanced
    fallback_min_beats: 4
    fallback_min_clean_ibi: 3
    fallback_min_quality_kept_ratio: 0.35
    fallback_use_beat_quality_filter: true
    fallback_hr_min_bpm: 45.0
    fallback_hr_max_bpm: 180.0
    hold_enabled: true
    max_hold_windows: 1
    hold_subject_boundary_reset: true
    hold_quality_floor: 0.45
    hold_jump_guard_bpm: 12.0

stage4:
  source:
    tachycardia_event: gated_stage3_ml_logreg
    bradycardia_event: gated_stage3_ml_logreg
    abrupt_change_event: robust_stage3c2_policy
  thresholds:
    tachy_hr_bpm: 100.0
    brady_hr_bpm: 50.0
    abrupt_delta_hr_bpm: 20.0
    abrupt_confirmation_ratio: 0.50
  persistence:
    tachy_min_valid_windows: 2
    brady_min_valid_windows: 2
    abrupt_min_valid_windows: 2
    episode_merge_gap_windows: 1
  quality_gate:
    mode: suppress
  proxy_target:
    source: ecg_reference_hr
    episode_based: true
    use_same_thresholds_as_detector: true

stage4_shared:
  selected_hr_source: robust_stage3c2_policy
  beat_variant_mode: enhanced
  min_beats: 4
  min_ibi_clean: 3
  min_ref_ibi_clean: 3

stage4_irregular:
  label:
    source: ecg_reference_ibi
    positive_rule: any
    min_ref_ibi_clean: 3
    irregular_rmssd_ms: 80.0
    irregular_pnn50: 0.35
    irregular_ibi_cv: 0.12
    irregular_local_deviation_ratio: 0.18
  rule_baseline:
    min_positive_indicators: 2
    thresholds:
      rmssd_ms: 70.0
      pnn50: 0.30
      ibi_cv: 0.10
      local_deviation_ratio_max: 0.16
      turning_point_ratio: 0.55
  model:
    default_method: hist_gbdt_irregular
    baseline_method: irregular_rule_baseline
    threshold: 0.50
    learning_rate: 0.05
    max_depth: 3
    max_iter: 200
    min_samples_leaf: 20
    l2_regularization: 0.0
  quality_gate:
    mode: suppress
    require_selected_hr_valid: true
    require_stage3_quality_pass: true
    stage3_quality_flag_column: ml_validity_flag
    require_support_sufficient: true
    disallowed_robust_sources: [none, hold_previous]
    disallowed_robust_actions: [hold, reject]

stage4_anomaly:
  model_name: isolation_forest_anomaly
  n_estimators: 200
  max_samples: auto
  max_features: 1.0
  bootstrap: false
  contamination: auto
  min_reference_rows: 16
  alert_quantile: 0.95
  fit_reference:
    require_quality_gate_pass: true
    require_support_sufficient: true
    require_proxy_support: true
  quality_gate:
    mode: suppress
    require_selected_hr_valid: true
    require_stage3_quality_pass: true
    stage3_quality_flag_column: ml_validity_flag
    require_support_sufficient: true
    disallowed_robust_sources: [none, hold_previous]
    disallowed_robust_actions: [hold, reject]

stage4_full:
  variant_name: default
  comparison:
    target_name: proxy_abnormal_union
    stage3_baseline_score_col: stage3_quality_suspicious_score
    stage3_baseline_flag_col: stage3_quality_suspicious_flag
  suspicion:
    event_min_score: 0.60
    two_signal_bonus: 0.10
    three_signal_bonus: 0.20

cache:
  enabled: true
  cache_dir: outputs/cache/stage4
  rebuild: false
  schema_version: stage4_v1

stage5:
  model_name: stage5_resp_multitask_cnn_v1
  model_dir: outputs/models/stage5
  window_seconds: 32.0
  step_seconds: 4.0
  input_fs: 16.0
  beat_target_ppg_fs: 64.0
  parallel_jobs: 16
  cache:
    enabled: true
    cache_dir: outputs/cache/stage5
    rebuild: false
    schema_version: stage5_v1
  reference:
    target_resp_fs: 25.0
    bandpass_low_hz: 0.08
    bandpass_high_hz: 0.70
    bandpass_order: 2
    min_rr_bpm: 6.0
    max_rr_bpm: 42.0
    welch_seconds: 24.0
    peak_prominence_scale: 0.15
    min_breaths: 3
    max_rr_disagreement_bpm: 3.0
    min_peak_power_fraction: 0.15
  baseline:
    bandpass_low_hz: 0.08
    bandpass_high_hz: 0.70
    bandpass_order: 2
    min_rr_bpm: 6.0
    max_rr_bpm: 42.0
    welch_seconds: 24.0
    min_quality_beats: 4
    min_beats: 4
    min_clean_ibi: 3
  beat:
    bandpass_low_hz: 0.6
    bandpass_high_hz: 3.5
    bandpass_order: 3
    smooth_window_seconds: 0.20
    refine_smooth_window_seconds: 0.10
    smooth_polyorder: 2
    extra_smoothing: true
    refine_extra_smoothing: false
    hr_min_bpm: 45.0
    hr_max_bpm: 180.0
    min_prominence: 0.05
    prominence_scale: 0.35
    prominence_percentile_low: 60.0
    prominence_percentile_high: 90.0
    prominence_percentile_scale: 0.18
    min_width_seconds: 0.08
    max_width_seconds: 0.45
    refine_radius_seconds: 0.08
    support_window_seconds: 0.10
    refractory_scale: 1.15
    isolated_gap_scale: 1.15
    low_quality_ratio: 0.55
    drop_sparse_low_quality: false
    use_baseline_recall_safeguard: true
  ibi:
    min_ibi_s: 0.33
    max_ibi_s: 1.5
    local_median_radius: 2
    max_deviation_ratio: 0.25
    adjacent_jump_ratio: 0.22
    jump_anchor_ratio: 0.12
    short_series_threshold: 5
    min_clean_ibi: 3
  beat_quality:
    enabled: true
    good_score_threshold: 0.55
    plausibility_margin_s: 0.08
    jump_good_ratio: 0.08
    jump_bad_ratio: 0.25
    crowding_good_scale: 1.10
    missing_ibi_score: 0.50
    weights:
      base_peak_quality: 0.60
      ibi_plausibility: 0.20
      ibi_stability: 0.10
      crowding: 0.05
      clean_pair_bonus: 0.05
  tuning:
    window_seconds_candidates: [32.0, 48.0]
    channel_sets: [ppg_acc, ppg_acc_ri]
    top_n_structures: 2
    phase_b_base_widths: [32, 64]
    phase_b_dropouts: [0.10, 0.20]
    phase_b_learning_rates: [0.001, 0.0003]
    phase_b_batch_sizes: [64, 128]
    phase_b_weight_decays: [0.0, 0.0001]
    phase_c_resp_validity_thresholds: [0.4, 0.5, 0.6]
    rr_loss_weight: 1.0
    validity_loss_weight: 0.25
    default_base_width: 32
    default_dropout: 0.10
    default_learning_rate: 0.001
    default_batch_size: 64
    default_weight_decay: 0.0
    default_resp_validity_threshold: 0.50
    tuning_max_epochs: 12
    tuning_patience: 4
    final_max_epochs: 20
    final_patience: 6
    min_predicted_valid_coverage: 0.30
    inner_val_test_size: 0.25
    inner_val_random_seed: 59
    max_tuning_windows_per_subject_train: 256
    max_tuning_windows_per_subject_val: 128
    torch_num_threads: 8

output:
  save_csv: true
  output_dir: outputs
  scope: canonical
  label: ""
  validation_subdir: validation
